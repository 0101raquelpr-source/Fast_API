name: FastAPI Automated Testing Pipeline

on:
  push:
    branches: [ main, master, develop, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Clonar el codigo en la maquina virtual
      uses: actions/checkout@v4

    - name: 2. Configurar el entorno de Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 3. Instalar librerias del requirements.txt
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 4. Ejecutar bateria de pruebas (Pytest)
      env:
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
      run: |
        pytest test_api2.py -v

    # SIMULACIÓN DE DESPLIEGUE EN AWS LOCALSTACK
    - name: 5. Configurar herramientas de AWS en el Pipeline
      run: |
        sudo apt-get update && sudo apt-get install -y awscli

    - name: 6. Crear repositorio y subir imagen al falso AWS
      run: |
        # 1. Indicar a AWS CLI que use nuestro LocalStack en lugar del AWS real
        aws ecr create-repository --repository-name mi-api-flask --endpoint-url=http://localhost:4566 --region eu-west-1 --no-sign-request
        
        # 2. Construir la imagen de nuestra API
        docker build -t localhost:4566/mi-api-flask:latest .
        
        # 3. La subimos al "falso" ECR de LocalStack
        docker push localhost:4566/mi-api-flask:latest