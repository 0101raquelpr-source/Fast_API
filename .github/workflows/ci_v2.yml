name: FastAPI Automated Testing Pipeline

on:
  push:
    branches: [ main, master, develop, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Clonar el codigo en la maquina virtual
      uses: actions/checkout@v4

    - name: 2. Configurar el entorno de Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 3. Instalar librerias del requirements.txt
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 4. Ejecutar bateria de pruebas (Pytest)
      env:
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
      run: |
        pytest test_api2.py -v


  deploy:
    name: Deploy to AWS
    needs: run-tests # ÚNICAMENTE arrancará si los tests dan verde
    if: github.ref == 'refs/heads/main' # Solo despliega si estamos en la rama main
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1 #region

      - name: Mensaje de preparación
        run: echo "El entorno está listo. Mañana configuramos el Login en AWS ECR y el Push de la imagen Docker."